{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.dbFullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgres.auth.username | b64enc }}
  POSTGRES_PASSWORD: {{ required "postgres.auth.password is required (or set postgres.auth.existingSecret)" .Values.postgres.auth.password | b64enc }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | b64enc }}
{{- else if and (not .Values.postgres.enabled) (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.dbFullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ required "externalDatabase.password is required (or set externalDatabase.existingSecret)" .Values.externalDatabase.password | b64enc }}
{{- end }}
