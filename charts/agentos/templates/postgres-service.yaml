{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentos.dbFullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "agentos.dbSelectorLabels" . | nindent 4 }}
{{- end }}
