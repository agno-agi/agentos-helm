{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
type: Opaque
data:
  OPENAI_API_KEY: {{ required "secrets.openaiApiKey is required (or set secrets.existingSecret)" .Values.secrets.openaiApiKey | b64enc }}
  {{- with .Values.secrets.jwtVerificationKey }}
  JWT_VERIFICATION_KEY: {{ . | b64enc }}
  {{- end }}
  {{- with .Values.secrets.mcpConnectSecret }}
  MCP_CONNECT_SECRET: {{ . | b64enc }}
  {{- end }}
  {{- with .Values.secrets.agentosMcpSigningKey }}
  AGENTOS_MCP_SIGNING_KEY: {{ . | b64enc }}
  {{- end }}
  {{- with .Values.secrets.parallelApiKey }}
  PARALLEL_API_KEY: {{ . | b64enc }}
  {{- end }}
  {{- with .Values.secrets.slackBotToken }}
  SLACK_BOT_TOKEN: {{ . | b64enc }}
  {{- end }}
  {{- with .Values.secrets.slackSigningSecret }}
  SLACK_SIGNING_SECRET: {{ . | b64enc }}
  {{- end }}
{{- end }}
