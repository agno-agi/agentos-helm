# Default values for the AgentOS chart.
#
# The two values every install must provide (or point existingSecret at):
#   secrets.openaiApiKey     — model + embedding calls
#   postgres.auth.password   — the in-cluster database password
# scripts/k8s/up.sh supplies both from your env file automatically.

image:
  # Defaults to the official image (the reference platform as-is; tags:
  # latest, agno-<pin>). The moment you customize anything — new agents,
  # edited instructions — build and push your own image and point these
  # values at it; on a local kind cluster build + `kind load docker-image`
  # and set pullPolicy: Never. See "Deploying to Kubernetes" in the README.
  repository: agnohq/agentos
  tag: "latest"
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# One replica BY DESIGN: the scheduler runs in-process, so two replicas
# double-fire every cron. Scale out only after making the scheduler
# single-instance.
replicaCount: 1

# "dev" disables JWT auth — local clusters only. Anything else (default
# "prd") requires secrets.jwtVerificationKey or the app refuses traffic.
runtimeEnv: prd

# Scheduler base URL — cron triggers reach AgentOS over this. Empty picks a
# sensible default: the public ingress URL when ingress is enabled, else the
# in-cluster service DNS (which works out of the box). Set it explicitly for
# custom domains.
agentosUrl: ""

# Path to a JWKS file inside the container — alternative to secrets.jwtVerificationKey for prd JWT verification.
jwtJwksFile: ""

secrets:
  create: true
  # Name of a pre-created Secret to use instead. Expected keys:
  # OPENAI_API_KEY (required), JWT_VERIFICATION_KEY, MCP_CONNECT_SECRET,
  # AGENTOS_MCP_SIGNING_KEY, PARALLEL_API_KEY, SLACK_BOT_TOKEN,
  # SLACK_SIGNING_SECRET (all optional).
  existingSecret: ""
  openaiApiKey: ""
  jwtVerificationKey: ""
  # MCP OAuth consent secret (≥16 chars) — set to turn /mcp into its own
  # OAuth 2.1 authorization server so claude.ai / ChatGPT (web) can connect.
  # scripts/k8s/up.sh generates one into your env file when the deploy has a
  # public URL (INGRESS_HOST or AGENTOS_URL).
  mcpConnectSecret: ""
  # Optional high-entropy signing-key material (≥32 chars) for OAuth tokens;
  # unset, a strong key is generated and persisted in the database.
  agentosMcpSigningKey: ""
  parallelApiKey: ""
  slackBotToken: ""
  slackSigningSecret: ""

# Extra environment variables for the api container (e.g. ENABLE_DEPLOY_CHECK,
# EVALS_TAG — see the README env table).
extraEnv: []

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  # - secretName: agentos-tls
  #   hosts: [os.example.com]
  tls: []

# Parity sizing across the template family is 2 vCPU / 4 GB (the limits);
# requests stay modest so the chart fits small clusters.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# In-cluster Postgres with pgvector (the same image the family uses
# everywhere). Disable and fill externalDatabase to bring your own — it must
# have the pgvector extension available.
postgres:
  enabled: true
  image: agnohq/pgvector:18
  auth:
    username: ai
    database: ai
    password: ""
    # Pre-created Secret with keys POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB.
    existingSecret: ""
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

externalDatabase:
  host: ""
  port: 5432
  username: ai
  database: ai
  password: ""
  # Pre-created Secret with key POSTGRES_PASSWORD.
  existingSecret: ""
